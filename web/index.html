<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Calculadora Solar 3D - CABA</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <script
        src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"
        crossorigin="anonymous"></script>
    <link
        href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css"
        rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }

        .maplibregl-popup-content {
            background-color: #1e1e1e;
            color: #fff;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            padding: 15px;
            min-width: 220px;
            border: 1px solid #333;
        }
        .solar-card h3 { margin: 0 0 10px 0; color: #f1c40f; font-size: 18px; border-bottom: 1px solid #444; padding-bottom: 8px;}
        .solar-card p { margin: 8px 0; font-size: 14px; color: #ccc; }
        .solar-card .highlight { color: #2ecc71; font-weight: bold; font-size: 16px; margin-top: 12px;}
    </style>
</head>
<body>

<div id="map"></div>

<script src="config.js"></script>
<script
    src="https://unpkg.com/pmtiles@2.11.0/dist/index.js"
    crossorigin="anonymous"></script>
<script>
    function escapeHtml(str) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
    }

    let protocol = new pmtiles.Protocol();
    maplibregl.addProtocol("pmtiles", protocol.tile);

    const PMTILES_URL = PMTILES_CONFIG.url;
    const SOURCE_LAYER = PMTILES_CONFIG.sourceLayer || 'buenos_aires_3d_completo_limpio';

    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
        center: [-58.3925, -34.5915],
        zoom: 16,
        pitch: 60,
        bearing: 0
    });

    map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), 'top-right');

    map.on('load', () => {
        map.setLight({
            anchor: "map",
            position: [1.15, 210, 30],
            color: "#fdb813",
            intensity: 0.4
        });

        if (!PMTILES_URL) {
            console.warn("PMTiles URL is null. Map will load without 3D buildings.");
            return;
        }

        map.addSource('buenos-aires-techos', {
            'type': 'vector',
            'url': 'pmtiles://' + PMTILES_URL
        });

        map.addLayer({
            'id': 'techos-3d',
            'type': 'fill-extrusion',
            'source': 'buenos-aires-techos',
            'source-layer': SOURCE_LAYER,
            'paint': {
                'fill-extrusion-color': [
                    'interpolate', ['linear'], ['get', 'area_util'],
                    0, '#2c3e50',
                    40, '#f1c40f',
                    100, '#e67e22',
                    250, '#e74c3c'
                ],
                'fill-extrusion-height': ['get', 'altura'],
                'fill-extrusion-base': 0,
                'fill-extrusion-opacity': 0.85
            }
        });

        map.on('mouseenter', 'techos-3d', () => map.getCanvas().style.cursor = 'pointer');
        map.on('mouseleave', 'techos-3d', () => map.getCanvas().style.cursor = '');

        map.on('click', 'techos-3d', (e) => {
            if (!e.features || !e.features.length) return;
            try {
            var props = e.features[0].properties || {};

            var energia = (typeof props.energia_anual_kwh === 'number'
                && !isNaN(props.energia_anual_kwh))
                ? props.energia_anual_kwh.toLocaleString('es-AR') : '0';
            var ahorro = (typeof props.ahorro_anual_ars === 'number'
                && !isNaN(props.ahorro_anual_ars))
                ? props.ahorro_anual_ars.toLocaleString('es-AR') : '0';
            var costo = (typeof props.costo_instalacion_ars === 'number'
                && !isNaN(props.costo_instalacion_ars))
                ? props.costo_instalacion_ars.toLocaleString('es-AR') : '0';
            var payback = (typeof props.payback_anios === 'number'
                && !isNaN(props.payback_anios))
                ? props.payback_anios : '0';

            var html = '<div class="solar-card">' +
                '<h3>☀️ ' + escapeHtml('Potencial Solar') + '</h3>' +
                '<p><strong>Generacion Est.:</strong> ' + escapeHtml(energia) + ' kWh/anio</p>' +
                '<p><strong>Inversion inicial:</strong> $' + escapeHtml(costo) + '</p>' +
                '<p><strong>Recupero (Payback):</strong> ' + escapeHtml(String(payback)) + ' anios</p>' +
                '<p class="highlight">💰 Ahorro: $' + escapeHtml(ahorro) + ' /anio</p>' +
                '</div>';

            new maplibregl.Popup({ closeButton: false })
                .setLngLat(e.lngLat)
                .setHTML(html)
                .addTo(map);
            } catch (popupErr) {
                console.warn("Failed to render popup:", popupErr);
            }
        });
    });
</script>
</body>
</html>
